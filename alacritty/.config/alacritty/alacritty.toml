[general]
# import any custom files
import = [
    "~/.config/alacritty/themes/dracula.toml"
]

[keyboard]
bindings = [{ key = "F11", action = "ToggleFullscreen" }]

[font]
normal = { family = "Fira Code", style = "Regular" }
bold = { family = "Fira Code", style = "Bold" }
italic = { family = "Fira Code", style = "Italic" }
size = 12.0

[window]
opacity = 0.75

